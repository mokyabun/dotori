"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
palette = "catppuccin_mocha"
format = "$directory$git_branch$git_status$nodejs$python$line_break$character"
right_format = "$cmd_duration$time"

[character]
success_symbol = "[>](green)"
error_symbol = "[>](red)"
vimcmd_symbol = "[<](blue)"

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = false
fish_style_pwd_dir_length = 1

[git_branch]
format = " [$symbol$branch]($style)"
symbol = "git:"
style = "mauve"

[git_status]
format = "([$all_status$ahead_behind]($style))"
style = "peach"
conflicted = "="
ahead = ">"
behind = "<"
diverged = "<>"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = ">"
deleted = "x"

[nodejs]
format = " [node $version](green)"

[python]
format = " [py $version](yellow)"

[cmd_duration]
min_time = 500
format = "[$duration](overlay1) "

[time]
disabled = false
format = "[$time](overlay1)"
time_format = "%H:%M"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
